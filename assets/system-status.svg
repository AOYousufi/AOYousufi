    <text x="490" y="95" font-family="'Courier New',Courier,monospace" font-size="10" font-weight="700" fill="#00ff88">● ONLINE</text>
  </g>

  <!-- DB -->
  <g class="fadeUp2">
    <circle cx="358" cy="117" r="4" fill="#00ff88" class="pulse2"/>
    <circle cx="358" cy="117" r="7" fill="#00ff88" fill-opacity="0.08" class="pulse2"/>
    <text x="372" y="121" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">PostgreSQL</text>
    <text x="490" y="121" font-family="'Courier New',Courier,monospace" font-size="10" font-weight="700" fill="#00ff88">● CONNECTED</text>
  </g>

  <!-- Auth -->
  <g class="fadeUp3">
    <circle cx="358" cy="143" r="4" fill="#00ff88" class="pulse3"/>
    <circle cx="358" cy="143" r="7" fill="#00ff88" fill-opacity="0.08" class="pulse3"/>
    <text x="372" y="147" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Auth System</text>
    <text x="490" y="147" font-family="'Courier New',Courier,monospace" font-size="10" font-weight="700" fill="#00ff88">● SECURED</text>
  </g>

  <!-- Tests -->
  <g class="fadeUp4">
    <circle cx="358" cy="169" r="4" fill="#00ff88" class="pulse4"/>
    <circle cx="358" cy="169" r="7" fill="#00ff88" fill-opacity="0.08" class="pulse4"/>
    <text x="372" y="173" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Test Suite</text>
    <text x="490" y="173" font-family="'Courier New',Courier,monospace" font-size="10" font-weight="700" fill="#00ff88">● PASSING</text>
  </g>

  <!-- Git -->
  <g class="fadeUp5">
    <circle cx="358" cy="195" r="4" fill="#00ff88" class="pulse5"/>
    <circle cx="358" cy="195" r="7" fill="#00ff88" fill-opacity="0.08" class="pulse5"/>
    <text x="372" y="199" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Version Control</text>
    <text x="490" y="199" font-family="'Courier New',Courier,monospace" font-size="10" font-weight="700" fill="#00ff88">● CLEAN</text>
  </g>

  <!-- Job Hunt -->
  <g class="fadeUp6">
    <circle cx="358" cy="221" r="4" fill="#ff6b35" class="pulse6"/>
    <circle cx="358" cy="221" r="7" fill="#ff6b35" fill-opacity="0.08" class="pulse6"/>
    <text x="372" y="225" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Job Hunt</text>
    <text x="490" y="225" font-family="'Courier New',Courier,monospace" font-size="10" font-weight="700" fill="#ff6b35">● SEARCHING</text>
  </g>

  <!-- uptime bar -->
  <text x="348" y="258" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e">UPTIME</text>
  <rect x="395" y="249" width="160" height="6" fill="#161b22" rx="2"/>
  <rect x="395" y="249" width="160" height="6" fill="url(#barGreen)" rx="2" opacity="0.7"/>
  <text x="562" y="257" font-family="'Courier New',Courier,monospace" font-size="8" fill="#00ff88">100%</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- DIVIDER 2 -->
  <!-- ══════════════════════════════════════════════════════════════ -->
