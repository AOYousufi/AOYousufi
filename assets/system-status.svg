  <!-- ══════════════════════════════════════════════════════════════ -->

  <text x="348" y="68" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e" letter-spacing="2.5">SERVICE STATUS</text>

  <!-- API Layer -->
  <g class="fadeUp1">
    <circle cx="358" cy="91" r="4" fill="#00ff88" class="pulse"/>
    <circle cx="358" cy="91" r="7" fill="#00ff88" fill-opacity="0.08" class="pulse"/>
