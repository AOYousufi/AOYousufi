<svg width="800" height="310" viewBox="0 0 800 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.15} }
    @keyframes blink    { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes scan     { 0%{transform:translateY(-4px)} 100%{transform:translateY(312px)} }
    @keyframes flicker  { 0%,89%,91%,100%{opacity:1} 90%{opacity:0.92} }
    @keyframes glow     { 0%,100%{filter:drop-shadow(0 0 3px #00ff88)} 50%{filter:drop-shadow(0 0 8px #00ff88)} }
    @keyframes slideIn  { from{width:0} to{width:var(--w)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .screen   { animation: flicker 7s ease-in-out infinite }
    .pulse    { animation: pulse 1.8s ease-in-out infinite }
    .pulse2   { animation: pulse 2.1s ease-in-out infinite 0.4s }
    .pulse3   { animation: pulse 1.5s ease-in-out infinite 0.8s }
    .pulse4   { animation: pulse 2.4s ease-in-out infinite 1.0s }
    .pulse5   { animation: pulse 1.9s ease-in-out infinite 0.2s }
    .pulse6   { animation: pulse 1.3s ease-in-out infinite 0.6s }
    .blink    { animation: blink 1s step-start infinite }
    .glow     { animation: glow 2.5s ease-in-out infinite }
    .scanline { animation: scan 4s linear infinite }

    .bar1 { animation: slideIn 1.4s 0.2s cubic-bezier(0.25,0.1,0.25,1) both; --w:162px }
    .bar2 { animation: slideIn 1.4s 0.4s cubic-bezier(0.25,0.1,0.25,1) both; --w:149px }
    .bar3 { animation: slideIn 1.4s 0.6s cubic-bezier(0.25,0.1,0.25,1) both; --w:140px }
    .bar4 { animation: slideIn 1.4s 0.8s cubic-bezier(0.25,0.1,0.25,1) both; --w:162px }
    .bar5 { animation: slideIn 1.4s 1.0s cubic-bezier(0.25,0.1,0.25,1) both; --w:153px }
    .bar6 { animation: slideIn 1.4s 1.2s cubic-bezier(0.25,0.1,0.25,1) both; --w:121px }
    .bar7 { animation: slideIn 1.4s 1.4s cubic-bezier(0.25,0.1,0.25,1) both; --w:108px }

    .fadeUp1 { animation: fadeUp 0.6s 0.5s ease both }
    .fadeUp2 { animation: fadeUp 0.6s 0.8s ease both }
    .fadeUp3 { animation: fadeUp 0.6s 1.1s ease both }
    .fadeUp4 { animation: fadeUp 0.6s 1.4s ease both }
    .fadeUp5 { animation: fadeUp 0.6s 1.7s ease both }
    .fadeUp6 { animation: fadeUp 0.6s 2.0s ease both }
  </style>

  <!-- BG -->
  <rect width="800" height="310" rx="8" fill="#0d1117"/>
  <rect width="800" height="310" rx="8" fill="url(#grid)" opacity="0.06"/>
  <rect width="800" height="310" rx="8" class="screen" fill="transparent"/>

  <!-- Scanline effect -->
  <rect width="800" height="3" fill="#00ff88" opacity="0.025" class="scanline"/>

  <!-- Subtle grid background -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff88" stroke-width="0.4"/>
    </pattern>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00cc6a" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e05520" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Outer border with glow -->
  <rect x="0.5" y="0.5" width="799" height="309" rx="7.5" stroke="#00ff88" stroke-opacity="0.3" class="glow"/>

  <!-- Header bg -->
  <rect width="800" height="44" rx="8" fill="url(#headerGrad)"/>
  <rect y="44" width="800" height="0.5" fill="#00ff88" fill-opacity="0.18"/>

  <!-- Live indicator dot -->
  <circle cx="22" cy="22" r="5" fill="#00ff88" class="pulse"/>
  <circle cx="22" cy="22" r="9" fill="#00ff88" fill-opacity="0.1" class="pulse"/>

  <!-- Header title -->
  <text x="38" y="17" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="700" fill="#00ff88" letter-spacing="2.5">DEVELOPER SYSTEM STATUS</text>
  <text x="38" y="34" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e" letter-spacing="1.5">Ahmad Yousufi · Backend Developer · Node.js / Express / PostgreSQL</text>

  <!-- Header right -->
  <rect x="634" y="13" width="10" height="10" fill="#00ff88" rx="1" class="pulse3"/>
  <text x="650" y="23" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88" letter-spacing="1">HIRING READY</text>
  <text x="650" y="36" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e" letter-spacing="1">UK · REMOTE · NOW</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- COLUMN 1: SKILLS (x: 20–300) -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <text x="20" y="68" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e" letter-spacing="2.5">CORE SYSTEMS</text>

  <!-- Node.js -->
  <text x="20" y="90" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Node.js</text>
  <rect x="110" y="80" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="80" height="7" fill="url(#barGreen)" rx="2" class="bar1"/>
  <text x="298" y="89" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">90%</text>

  <!-- Express -->
  <text x="20" y="110" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Express</text>
  <rect x="110" y="100" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="100" height="7" fill="url(#barGreen)" rx="2" class="bar2"/>
  <text x="298" y="109" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">83%</text>

  <!-- PostgreSQL -->
  <text x="20" y="130" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">PostgreSQL</text>
  <rect x="110" y="120" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="120" height="7" fill="url(#barGreen)" rx="2" class="bar3"/>
  <text x="298" y="129" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">78%</text>

  <!-- JavaScript -->
  <text x="20" y="150" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">JavaScript</text>
  <rect x="110" y="140" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="140" height="7" fill="url(#barGreen)" rx="2" class="bar4"/>
  <text x="298" y="149" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">90%</text>

  <!-- REST APIs -->
  <text x="20" y="170" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">REST APIs</text>
  <rect x="110" y="160" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="160" height="7" fill="url(#barGreen)" rx="2" class="bar5"/>
  <text x="298" y="169" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">85%</text>

  <!-- Jest / TDD -->
  <text x="20" y="190" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Jest / TDD</text>
  <rect x="110" y="180" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="180" height="7" fill="url(#barOrange)" rx="2" class="bar6"/>
  <text x="298" y="189" font-family="'Courier New',Courier,monospace" font-size="9" fill="#ff6b35">67%</text>

  <!-- React -->
  <text x="20" y="210" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">React</text>
  <rect x="110" y="200" width="180" height="7" fill="#161b22" rx="2"/>
  <rect x="110" y="200" height="7" fill="url(#barOrange)" rx="2" class="bar7"/>
  <text x="298" y="209" font-family="'Courier New',Courier,monospace" font-size="9" fill="#ff6b35">60%</text>

  <!-- legend -->
  <circle cx="22" cy="234" r="3" fill="#00ff88"/>
  <text x="30" y="238" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e">Core strength</text>
  <circle cx="120" cy="234" r="3" fill="#ff6b35"/>
  <text x="128" y="238" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e">Growing</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- DIVIDER 1 -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <line x1="330" y1="54" x2="330" y2="290" stroke="#00ff88" stroke-opacity="0.12" stroke-dasharray="4 4"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
