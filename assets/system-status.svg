  <!-- ══════════════════════════════════════════════════════════════ -->

  <text x="598" y="68" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e" letter-spacing="2.5">PROFILE DATA</text>

  <!-- Degree -->
  <text x="598" y="96" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e" letter-spacing="1">EDUCATION</text>
  <text x="598" y="113" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">BSc Software Dev</text>
  <text x="598" y="129" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">Staffordshire Uni</text>

  <line x1="598" y1="140" x2="782" y2="140" stroke="#00ff88" stroke-opacity="0.1"/>

  <!-- Bootcamp -->
  <text x="598" y="156" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e" letter-spacing="1">BOOTCAMP</text>
  <text x="598" y="173" font-family="'Courier New',Courier,monospace" font-size="10" fill="#c9d1d9">Northcoders</text>
  <text x="598" y="189" font-family="'Courier New',Courier,monospace" font-size="9" fill="#00ff88">Full-Stack Graduate</text>

  <line x1="598" y1="200" x2="782" y2="200" stroke="#00ff88" stroke-opacity="0.1"/>

  <!-- Role target -->
  <text x="598" y="216" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e" letter-spacing="1">TARGET ROLE</text>
  <text x="598" y="233" font-family="'Courier New',Courier,monospace" font-size="10" fill="#ff6b35">Junior Backend Dev</text>
  <text x="598" y="249" font-family="'Courier New',Courier,monospace" font-size="9" fill="#8b949e">UK · Remote · Available</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- FOOTER -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect y="290" width="800" height="20" rx="8" fill="#00ff88" fill-opacity="0.03"/>
  <line x1="0" y1="290" x2="800" y2="290" stroke="#00ff88" stroke-opacity="0.15"/>

  <text x="20" y="304" font-family="'Courier New',Courier,monospace" font-size="8" fill="#8b949e" letter-spacing="1">
    SYS v2.1.0 · errors: 0 · warnings: 0 · processes: clean
  </text>
