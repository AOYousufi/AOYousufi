<svg width="720" height="280" viewBox="0 0 720 280" fill="none" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
  <defs>
    <style>
      @keyframes a0  { 0%,2%  {opacity:0} 3%,90%  {opacity:1} 91%,100%{opacity:0} }
      @keyframes a1  { 0%,8%  {opacity:0} 9%,90%  {opacity:1} 91%,100%{opacity:0} }
      @keyframes a2  { 0%,14% {opacity:0} 15%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a3  { 0%,20% {opacity:0} 21%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a4  { 0%,26% {opacity:0} 27%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a5  { 0%,32% {opacity:0} 33%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a6  { 0%,38% {opacity:0} 39%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a7  { 0%,44% {opacity:0} 45%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a8  { 0%,50% {opacity:0} 51%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a9  { 0%,58% {opacity:0} 59%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes a10 { 0%,66% {opacity:0} 67%,90% {opacity:1} 91%,100%{opacity:0} }
      @keyframes scan { from{transform:translateY(-2px)} to{transform:translateY(282px)} }
      @keyframes glw  { 0%,100%{stroke-opacity:0.25} 50%{stroke-opacity:0.55} }
      @keyframes blink{ 0%,49%{opacity:0.85} 50%,100%{opacity:0} }
      .g0  {opacity:0;animation:a0  14s linear infinite}
      .g1  {opacity:0;animation:a1  14s linear infinite}
      .g2  {opacity:0;animation:a2  14s linear infinite}
      .g3  {opacity:0;animation:a3  14s linear infinite}
      .g4  {opacity:0;animation:a4  14s linear infinite}
      .g5  {opacity:0;animation:a5  14s linear infinite}
      .g6  {opacity:0;animation:a6  14s linear infinite}
      .g7  {opacity:0;animation:a7  14s linear infinite}
      .g8  {opacity:0;animation:a8  14s linear infinite}
      .g9  {opacity:0;animation:a9  14s linear infinite}
      .g10 {opacity:0;animation:a10 14s linear infinite}
      .sc  {animation:scan 6s linear infinite}
      .bd  {animation:glw  3s ease-in-out infinite}
      .cu  {animation:blink 1s step-start infinite}
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" rx="10" fill="#050510"/>

  <!-- Scanline -->
  <rect y="-2" width="720" height="2" fill="#4f8eff" opacity="0.04" class="sc"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="719" height="279" rx="9.5"
        fill="none" stroke="#4f8eff" class="bd"/>

  <!-- Corner brackets -->
  <path d="M6 6L6 18M6 6L18 6"       stroke="#4f8eff" stroke-opacity="0.5" stroke-width="1.5"/>
  <path d="M714 6L714 18M714 6L702 6" stroke="#4f8eff" stroke-opacity="0.5" stroke-width="1.5"/>
  <path d="M6 274L6 262M6 274L18 274" stroke="#4f8eff" stroke-opacity="0.5" stroke-width="1.5"/>
  <path d="M714 274L714 262M714 274L702 274" stroke="#4f8eff" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect width="720" height="36" rx="10" fill="rgba(79,142,255,0.04)"/>
  <line x1="0" y1="36" x2="720" y2="36" stroke="#4f8eff" stroke-opacity="0.1"/>

  <!-- Traffic-light dots -->
  <circle cx="20" cy="18" r="5.5" fill="#e8e8f0" fill-opacity="0.08"/>
  <circle cx="36" cy="18" r="5.5" fill="#e8e8f0" fill-opacity="0.08"/>
  <circle cx="52" cy="18" r="5.5" fill="#e8e8f0" fill-opacity="0.08"/>

  <!-- Tab label -->
  <text x="70" y="23" font-family="'Courier New',Courier,monospace"
        font-size="11" fill="#8888aa" letter-spacing="1.5">npm install</text>

  <!-- Status pill -->
  <rect x="592" y="10" width="112" height="16" rx="8"
        fill="rgba(0,212,255,0.07)" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="600" y="22" font-family="'Courier New',Courier,monospace"
        font-size="9" fill="#00d4ff" letter-spacing="1.2">OPEN TO WORK</text>

  <!-- ── ANIMATED CONTENT ─────────────────────────────────────── -->

  <!-- g0: prompt + blinking cursor -->
  <g class="g0">
    <text x="24" y="62" font-family="'Courier New',Courier,monospace"
          font-size="13" font-weight="bold" fill="#4f8eff">$ npm install ahmad-yousufi</text>
    <rect x="237" y="50" width="8" height="13" fill="#4f8eff" class="cu"/>
  </g>

  <!-- g1: resolving -->
  <g class="g1">
    <text x="28" y="86" font-family="'Courier New',Courier,monospace"
          font-size="12" fill="#8888aa">  ⚡ resolving packages...</text>
  </g>

  <!-- g2: javascript -->
  <g class="g2">
    <text x="28" y="108" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#00d4ff">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> javascript@es2024</tspan>
    </text>
  </g>

  <!-- g3: node.js -->
  <g class="g3">
    <text x="28" y="128" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#00d4ff">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> node.js@lts</tspan>
    </text>
  </g>

  <!-- g4: express -->
  <g class="g4">
    <text x="28" y="148" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#00d4ff">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> express@v5</tspan>
    </text>
  </g>

  <!-- g5: postgresql -->
  <g class="g5">
    <text x="28" y="168" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#00d4ff">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> postgresql@16</tspan>
    </text>
  </g>

  <!-- g6: react (violet check = frontend, secondary) -->
  <g class="g6">
    <text x="28" y="188" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#a78bfa">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> react@19</tspan>
    </text>
  </g>

  <!-- g7: jest-tdd -->
  <g class="g7">
    <text x="28" y="208" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#a78bfa">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> jest@tdd-mode</tspan>
    </text>
  </g>

  <!-- g8: clean-code (blue = principle, not dependency) -->
  <g class="g8">
    <text x="28" y="228" font-family="'Courier New',Courier,monospace" font-size="12">
      <tspan fill="#4f8eff">  ✓</tspan><tspan fill="#e8e8f0" dx="4"> clean-code-principles</tspan>
    </text>
  </g>

  <!-- g9: summary -->
  <g class="g9">
    <text x="28" y="250" font-family="'Courier New',Courier,monospace"
          font-size="12" fill="#8888aa">  added 7 packages in 0ms</text>
  </g>

  <!-- g10: result -->
  <g class="g10">
    <text x="28" y="268" font-family="'Courier New',Courier,monospace"
          font-size="12" font-weight="bold" fill="#4f8eff">
      &#x2192; ahmad-yousufi@2026 ready · UK · remote · open to work
    </text>
  </g>

</svg>
